name: Build and Release SWC Assistant Skill

# Триггеры сборки
on:
  # Автоматически при коммите в main (если изменился контент или сборочные файлы)
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'projects/**'
      - 'faq/**'
      - 'updates/**'
      - 'skill-template/**'
      - 'scripts/build_skill.py'
      - 'VERSION'
      - '.github/workflows/build-skill.yml'

  # Ручной запуск через кнопку "Run workflow" на GitHub
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Тег релиза (например, v2.2.1). Если пусто - используется VERSION из репозитория.'
        required: false
        type: string

permissions:
  contents: write  # для создания релизов

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install PyYAML

      - name: Определение версии
        id: version
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            VERSION="${{ inputs.release_tag }}"
            VERSION="${VERSION#v}"  # убираем префикс v, если есть
          else
            VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Собираем версию: v$VERSION"

      - name: Сборка .skill
        run: |
          python scripts/build_skill.py \
            --repo . \
            --output dist/swc-assistant-v${{ steps.version.outputs.VERSION }}.skill \
            --version ${{ steps.version.outputs.VERSION }}

      - name: Копия со стабильным именем для latest
        run: cp dist/swc-assistant-v${{ steps.version.outputs.VERSION }}.skill dist/swc-assistant.skill

      - name: Artifact для загрузки (даже без релиза)
        uses: actions/upload-artifact@v4
        with:
          name: swc-assistant-v${{ steps.version.outputs.VERSION }}
          path: dist/*.skill
          retention-days: 90

      - name: Проверка существования релиза
        id: check_release
        run: |
          if gh release view ${{ steps.version.outputs.TAG }} &>/dev/null; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "ℹ️  Релиз ${{ steps.version.outputs.TAG }} уже существует - обновляю файлы"
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
            echo "🆕 Создаю новый релиз ${{ steps.version.outputs.TAG }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Создание релиза (если не существует)
        if: steps.check_release.outputs.EXISTS == 'false'
        run: |
          gh release create ${{ steps.version.outputs.TAG }} \
            --title "SWC Assistant v${{ steps.version.outputs.VERSION }}" \
            --notes "Автоматическая сборка от $(date -u +'%Y-%m-%d %H:%M UTC')

          **Установка:**
          1. Скачай файл \`swc-assistant.skill\` ниже
          2. В Claude.ai: Settings → Capabilities → Skills → Upload skill

          **Что нового в этой версии:** см. [CHANGELOG.md](../../blob/main/CHANGELOG.md)

          ---
          Коммит: ${{ github.sha }}" \
            dist/swc-assistant.skill \
            dist/swc-assistant-v${{ steps.version.outputs.VERSION }}.skill
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Обновление файлов в существующем релизе
        if: steps.check_release.outputs.EXISTS == 'true'
        run: |
          gh release upload ${{ steps.version.outputs.TAG }} \
            dist/swc-assistant.skill \
            dist/swc-assistant-v${{ steps.version.outputs.VERSION }}.skill \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Итог
        run: |
          echo "✅ Готово"
          echo ""
          echo "🔗 Ссылка на релиз:"
          echo "   https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.TAG }}"
          echo ""
          echo "📦 Прямая ссылка для скачивания (всегда актуальная версия релиза):"
          echo "   https://github.com/${{ github.repository }}/releases/latest/download/swc-assistant.skill"
